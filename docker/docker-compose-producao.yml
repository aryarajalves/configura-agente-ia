version: '3.8'

services:

  celery_beat:
    image: aryarajalves/configurar-agentes-ia:1.1.9-backend
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    networks:
      - network_swarm_public
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - GUNICORN_WORKERS=4
      - FRONTEND_URL=https://agentefrontlucas.agency10x.com.br
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY}
      - AGENT_API_KEY=${AGENT_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - CORS_ALLOWED_ORIGINS=https://agentefrontlucas.agency10x.com.br
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - S3_ENABLED=True
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION}
    command: ["celery", "-A", "celery_app", "beat", "--loglevel=info"]
    deploy:
      mode: replicated
      replicas: 1

  celery_worker_json:
    image: aryarajalves/configurar-agentes-ia:1.1.9-backend
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    networks:
      - network_swarm_public
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - GUNICORN_WORKERS=4
      - FRONTEND_URL=https://agentefrontlucas.agency10x.com.br
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY}
      - AGENT_API_KEY=${AGENT_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - CORS_ALLOWED_ORIGINS=https://agentefrontlucas.agency10x.com.br
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - S3_ENABLED=True
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION}
    command: ["celery", "-A", "celery_app", "worker", "--loglevel=info", "-Q", "json_processing", "-c", "1"]
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: "1"
          memory: 2048M

  celery_worker:
    image: aryarajalves/configurar-agentes-ia:1.1.9-backend
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    networks:
      - network_swarm_public
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - GUNICORN_WORKERS=4
      - FRONTEND_URL=https://agentefrontlucas.agency10x.com.br
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY}
      - AGENT_API_KEY=${AGENT_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - CORS_ALLOWED_ORIGINS=https://agentefrontlucas.agency10x.com.br
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - S3_ENABLED=True
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION}
    command: ["celery", "-A", "celery_app", "worker", "--loglevel=info", "-Q", "celery"]
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: "1"
          memory: 4096M

  backend:
    image: aryarajalves/configurar-agentes-ia:1.1.9-backend
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    networks:
      - network_swarm_public
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - GUNICORN_WORKERS=4
      - GUNICORN_TIMEOUT=3600
      - FRONTEND_URL=https://agentefrontlucas.agency10x.com.br
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY}
      - AGENT_API_KEY=${AGENT_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - CORS_ALLOWED_ORIGINS=https://agentefrontlucas.agency10x.com.br
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - S3_ENABLED=True
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION}
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "2"
          memory: 4096M
      labels:
        - traefik.enable=true
        - traefik.http.routers.agentes_backend.rule=Host(`agentebacklucas.agency10x.com.br`)
        - traefik.http.routers.agentes_backend.entrypoints=websecure
        - traefik.http.routers.agentes_backend.tls.certresolver=letsencryptresolver
        - traefik.http.routers.agentes_backend.service=agentes_backend
        - traefik.http.services.agentes_backend.loadbalancer.server.port=8000
        - traefik.http.services.agentes_backend.loadbalancer.passhostheader=true
        - traefik.http.middlewares.sslheader.headers.customrequestheaders.X-Forwarded-Proto=https
        - traefik.http.routers.agentes_backend.middlewares=sslheader@docker

  frontend:
    image: aryarajalves/configurar-agentes-ia:1.1.9-frontend
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    networks:
      - network_swarm_public
    secrets:
      - source: VITE_API_URL
        target: VITE_API_URL
      - source: VITE_AGENT_API_KEY
        target: VITE_AGENT_API_KEY
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      labels:
        - traefik.enable=true
        - traefik.http.routers.agentes_frontend.rule=Host(`agentefrontlucas.agency10x.com.br`)
        - traefik.http.routers.agentes_frontend.entrypoints=websecure
        - traefik.http.routers.agentes_frontend.tls.certresolver=letsencryptresolver
        - traefik.http.routers.agentes_frontend.service=agentes_frontend
        - traefik.http.services.agentes_frontend.loadbalancer.server.port=80
        - traefik.http.services.agentes_frontend.loadbalancer.passhostheader=true
        - traefik.http.middlewares.sslheader.headers.customrequestheaders.X-Forwarded-Proto=https
        - traefik.http.routers.agentes_frontend.middlewares=sslheader@docker

networks:
  network_swarm_public:
    external: true
    name: network_swarm_public

secrets:
  VITE_API_URL:
    external: true
  VITE_AGENT_API_KEY:
    external: true
