version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg14
    container_name: banco-agente-local
    env_file:
      - ../.env
    ports:
      - "${POSTGRES_PORT_EXTERNAL:-5433}:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ../backend
    container_name: backend-agente-local
    env_file:
      - ../.env
    ports:
      - "8002:8000"
    volumes:
      - ../backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ai_agent_db}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-1}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      - PYTHONUNBUFFERED=1
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
    depends_on:
      db:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq-agente-local
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 5

  celery_worker:
    build: ../backend
    container_name: celery-worker-agente-local
    env_file:
      - ../.env
    volumes:
      - ../backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ai_agent_db}
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - PYTHONUNBUFFERED=1
    command: celery -A celery_app worker --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  celery_beat:
    build: ../backend
    container_name: celery-beat-agente-local
    env_file:
      - ../.env
    volumes:
      - ../backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ai_agent_db}
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - PYTHONUNBUFFERED=1
    command: celery -A celery_app beat --loglevel=info
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  flower:
    build: ../backend
    container_name: flower-agente-local
    env_file:
      - ../.env
    ports:
      - "5555:5555"
    volumes:
      - ../backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-ai_agent_db}
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
    command: celery -A celery_app flower --port=5555
    depends_on:
      rabbitmq:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      target: development
    container_name: frontend-agente-local
    env_file:
      - ../.env
    ports:
      - "5300:5173"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8002
    depends_on:
      - backend

volumes:
  postgres_local_data:
