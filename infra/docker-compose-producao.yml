version: '3.8'

services:

  rabbitmq:
    image: rabbitmq:3-management
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    networks:
      - network_swarm_public
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS:-guest}
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: "1"
          memory: 1024M

  backend:
    image: ${IMAGE_BASE}-backend
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    networks:
      - network_swarm_public
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - GUNICORN_WORKERS=4
      - GUNICORN_TIMEOUT=3600
      - FRONTEND_URL=https://agentevetmanager.cleverdev.cloud
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY}
      - AGENT_API_KEY=${AGENT_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - CORS_ALLOWED_ORIGINS=https://agentevetmanager.cleverdev.cloud
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      - S3_ENABLED=True
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION}
      - PYTHONUNBUFFERED=1
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "2"
          memory: 4096M
      labels:
        - traefik.enable=true
        - traefik.docker.network=network_swarm_public
        - traefik.http.routers.vet-back-v1.rule=Host(`backagentevetmanager.cleverdev.cloud`)
        - traefik.http.routers.vet-back-v1.entrypoints=websecure
        - traefik.http.routers.vet-back-v1.tls=true
        - traefik.http.routers.vet-back-v1.tls.certresolver=letsencryptresolver
        - traefik.http.services.vet-back-v1-svc.loadbalancer.server.port=8000
        - traefik.http.services.vet-back-v1-svc.loadbalancer.passhostheader=true
        - traefik.http.middlewares.vet-back-header.headers.customrequestheaders.X-Forwarded-Proto=https
        - traefik.http.routers.vet-back-v1.middlewares=vet-back-header

  worker:
    image: ${IMAGE_BASE}-backend
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    networks:
      - network_swarm_public
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - FRONTEND_URL=https://agentevetmanager.cleverdev.cloud
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ASSEMBLYAI_API_KEY=${ASSEMBLYAI_API_KEY}
      - AGENT_API_KEY=${AGENT_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - CORS_ALLOWED_ORIGINS=https://agentevetmanager.cleverdev.cloud
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://guest:guest@rabbitmq:5672/}
      - S3_ENABLED=True
      - S3_ENDPOINT_URL=${S3_ENDPOINT_URL}
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION}
      - PYTHONUNBUFFERED=1
    command: [ "sh", "/app/entrypoint.sh", "worker" ]
    deploy:
      mode: replicated
      replicas: 1
      resources:
        limits:
          cpus: "1"
          memory: 4096M

  frontend:
    image: ${IMAGE_BASE}-${FRONTEND_IMAGE_SUFFIX:-frontend}
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"
    networks:
      - network_swarm_public
    secrets:
      - source: VITE_API_URL
        target: VITE_API_URL
      - source: VITE_AGENT_API_KEY
        target: VITE_AGENT_API_KEY
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
      labels:
        - traefik.enable=true
        - traefik.docker.network=network_swarm_public
        - traefik.http.routers.vet-front-v1.rule=Host(`agentevetmanager.cleverdev.cloud`)
        - traefik.http.routers.vet-front-v1.entrypoints=websecure
        - traefik.http.routers.vet-front-v1.tls=true
        - traefik.http.routers.vet-front-v1.tls.certresolver=letsencryptresolver
        - traefik.http.services.vet-front-v1-svc.loadbalancer.server.port=80
        - traefik.http.services.vet-front-v1-svc.loadbalancer.passhostheader=true
        - traefik.http.middlewares.vet-front-header.headers.customrequestheaders.X-Forwarded-Proto=https
        - traefik.http.routers.vet-front-v1.middlewares=vet-front-header

networks:
  network_swarm_public:
    external: true
    name: network_swarm_public

secrets:
  VITE_API_URL:
    external: true
  VITE_AGENT_API_KEY:
    external: true
