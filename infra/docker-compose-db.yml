version: '3.8'

services:
  db:
    image: postgres:14
    container_name: banco-agente
    ports:
      - "5433:5432" # Maps host port 5433 to container port 5432 to avoid conflict with local PG
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_DB=ai_agent_db
      - POSTGRES_HOST_AUTH_METHOD=trust # Allows passwordless connections
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
